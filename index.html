<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
    --pink: #ff69b4; 
    --bg1: #1a0f1a; 
    --bg2: #2d1b2d; 
    --card-bg: #2d1b2d;
}
body {
    margin:0; height:100vh; display:flex; justify-content:center; align-items:center; font-family:'Segoe UI',sans-serif; overflow:hidden;
    background: linear-gradient(270deg, var(--bg1), var(--bg2), #3a1f3a);
    background-size: 600% 600%;
    animation: bgMove 12s ease infinite;
    perspective: 1000px;
}
@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* Phone wrapper */
.phone{width:350px;height:640px;border-radius:40px;overflow:hidden;position:relative;border:8px solid #222;box-shadow:0 0 40px rgba(0,0,0,0.6);}

/* Pages */
.page{
    position:absolute; width:100%; height:100%; padding:30px 20px; box-sizing:border-box;
    display:flex; flex-direction:column; align-items:center; text-align:center;
    top:0; left:0;
    opacity:0; transform:translateX(100%) scale(0.95);
    transition: all 0.6s cubic-bezier(.6,-0.28,.735,.045); z-index:1;
}
.page.active{opacity:1; transform:translateX(0) scale(1); z-index:2;}
.page.prev{transform:translateX(-50%) scale(0.9); opacity:0; z-index:1;}

/* Circle image */
.circle{
    width:110px;height:110px;border-radius:50%;border:3px solid var(--pink);
    margin-bottom:20px; animation: glow 2s infinite; transition: transform 0.3s;
    box-shadow:0 0 15px rgba(255,105,180,0.7);
}
@keyframes glow{0%{box-shadow:0 0 10px var(--pink)}50%{box-shadow:0 0 25px var(--pink)}100%{box-shadow:0 0 10px var(--pink)}}

/* Ticker */
.ticker{width:100%; overflow:hidden; background:rgba(255,255,255,0.05); border-radius:20px; margin:15px 0; padding:10px 0; pointer-events:none;}
.ticker-track{display:inline-block; white-space:nowrap; animation:scroll 12s linear infinite; color:var(--pink); font-weight:bold; text-shadow:0 0 10px var(--pink);}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Description typing */
.desc{margin-top:8px; font-size:14px; color:#ccc;}
.desc span{color:var(--pink); font-weight:bold; text-shadow:0 0 8px var(--pink);}

/* Cards */
.card{background:var(--card-bg); width:100%; padding:15px; border-radius:15px; margin:10px 0; text-align:left;
    border-left:4px solid var(--pink); opacity:0; transform:translateY(30px) rotateX(10deg); transition:all 0.6s ease; cursor:pointer;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}
.card.show{opacity:1; transform:translateY(0) rotateX(0deg);}

/* Buttons */
.btn{background:var(--pink); border:none; padding:12px; border-radius:25px; width:100%; color:white; font-weight:bold; margin-top:10px; cursor:pointer; position:relative; overflow:hidden; transition:0.3s;}
.btn:hover{transform:scale(1.05); box-shadow:0 0 15px var(--pink);}
.btn span.ripple{position:absolute;border-radius:50%;transform:scale(0);animation:ripple 0.6s linear;background:rgba(255,255,255,0.5);}
@keyframes ripple{to{transform:scale(4);opacity:0;}}

/* Social icons */
.social-links{margin-top:auto; display:flex; gap:20px; margin-bottom:10px;}
.social-links a{color:white; font-size:22px; transition:0.3s;}
.social-links a:hover{color:var(--pink); transform:scale(1.2);}
</style>
</head>
<body>
<div class="phone">

<!-- Page 1 -->
<div class="page active" id="p1">
    <div class="circle"></div>
    <h2 style="color:white; text-shadow:0 0 10px var(--pink)">Eng. Taghreed</h2>
    <div class="ticker"><div class="ticker-track">🏆 Ranked #1 | GPA 4.0 | Top Graduate 💎 | 🏆 Ranked #1 | GPA 4.0 | Top Graduate 💎</div></div>
    <div class="desc"><span></span></div>
    <div class="social-links">
        <a href="#"><i class="fab fa-linkedin"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>
        <a href="#"><i class="fas fa-envelope"></i></a>
    </div>
    <button class="btn" id="next1">Next →</button>
</div>

<!-- Page 2 -->
<div class="page" id="p2">
    <h2 style="color:var(--pink); text-shadow:0 0 10px var(--pink)">Skills</h2>
    <div class="card">KPI Analysis 📊</div>
    <div class="card">Business Insights 💡</div>
    <div class="card">Dashboarding 📈</div>
    <button class="btn" id="next2">Next →</button>
    <button class="btn" id="back2">← Back</button>
</div>

<!-- Page 3 -->
<div class="page" id="p3">
    <h2 style="color:var(--pink); text-shadow:0 0 10px var(--pink)">Projects</h2>
    <div class="card">Data-Driven Strategy</div>
    <div class="card">KPI Optimization</div>
    <button class="btn" id="back3">← Back</button>
</div>

</div>

<script>
// Page navigation
let current=0;
const pages=document.querySelectorAll(".page");
function showPage(index){
    pages.forEach((p,i)=>{
        p.classList.remove("active","prev");
        if(i===index)p.classList.add("active");
        if(i<index)p.classList.add("prev");
    });
    current=index;
    // Show cards with stagger animation
    const cards = pages[index].querySelectorAll(".card");
    cards.forEach((c,idx)=>{c.classList.remove("show"); setTimeout(()=>c.classList.add("show"),idx*200);});
}

// Buttons
document.getElementById("next1").addEventListener("click",()=>showPage(1));
document.getElementById("next2").addEventListener("click",()=>showPage(2));
document.getElementById("back2").addEventListener("click",()=>showPage(0));
document.getElementById("back3").addEventListener("click",()=>showPage(1));

// Ripple effect
document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("click",function(e){
        const circle=document.createElement("span");
        circle.classList.add("ripple");
        circle.style.left=e.offsetX+"px";
        circle.style.top=e.offsetY+"px";
        this.appendChild(circle);
        setTimeout(()=>circle.remove(),600);
    });
});

// Typing effect
const descText=["Turning Data into Business Decisions 📈","Focused on KPI Analysis, Insights & Growth"];
let dIndex=0,dChar=0,deleting=false;
function typeDesc(){
    const el=document.querySelector(".desc span");
    let txt=descText[dIndex];
    el.textContent=deleting?txt.substring(0,dChar--):txt.substring(0,dChar++);
    if(!deleting && dChar>txt.length){deleting=true; setTimeout(typeDesc,1500); return;}
    if(deleting && dChar<0){deleting=false; dIndex=(dIndex+1)%descText.length; dChar=0;}
    setTimeout(typeDesc,deleting?50:100);
}
typeDesc();

// Parallax for circle
document.addEventListener("mousemove",(e)=>{
    let x=(e.clientX/window.innerWidth-0.5)*15;
    let y=(e.clientY/window.innerHeight-0.5)*15;
    document.querySelector(".circle").style.transform=`translate(${x}px,${y}px)`;
});
</script>
</body>
</html>
