 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --pink: #ff6fa5;
    --purple: #a78bfa;
    --green: #6ee7b7;

    --bg1: #1a0f1a;
    --bg2: #2d1b2d;
    --card-bg: #2d1b2d;
}

/* BODY */
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
    background: linear-gradient(270deg, var(--bg1), var(--bg2), #3a1f3a);
    background-size: 600% 600%;
    animation: bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* PHONE */
.phone{
    width:350px;
    height:640px;
    border-radius:40px;
    overflow:hidden;
    position:relative;
    border:8px solid #222;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* PAGES */
.page{
    position:absolute;
    width:100%;
    height:100%;
    padding:30px 20px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    top:0;
    left:0;
    opacity:0;
    transform:translateX(100%) scale(0.95);
    transition: all 0.6s ease;
}

.page.active{
    opacity:1;
    transform:translateX(0) scale(1);
}

/* PAGE COLORS */
.page.purple{
    background: linear-gradient(270deg,#1a0f1a,#2a1a3a,#3b1f4d);
}

.page.green{
    background: linear-gradient(270deg,#0f1a14,#1a2d22,#1f3a2b);
}

/* CIRCLE */
.circle{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid var(--pink);
    margin-bottom:20px;
    box-shadow:0 0 15px var(--pink);
}

/* NAME */
h2{
    color:white;
    text-shadow:0 0 10px rgba(255,255,255,0.3);
}

/* TICKER */
.ticker{
    width:100%;
    overflow:hidden;
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    margin:15px 0;
    padding:10px 0;
}
.ticker-track{
    white-space:nowrap;
    display:inline-block;
    animation:scroll 12s linear infinite;
    color:var(--pink);
    font-weight:bold;
}
@keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
}

/* DESC */
.desc span{
    color:var(--pink);
    font-weight:bold;
}

/* CARDS */
.card{
    background:var(--card-bg);
    width:100%;
    padding:15px;
    border-radius:15px;
    margin:10px 0;
    text-align:left;
    border-left:4px solid var(--pink);
    opacity:0;
    transform:translateY(30px);
    transition:0.5s;
}
.card.show{
    opacity:1;
    transform:translateY(0);
}

/* PAGE COLORS CARDS */
.page.purple .card{
    border-left:4px solid var(--purple);
}
.page.green .card{
    border-left:4px solid var(--green);
}

/* BUTTON */
.btn{
    background:var(--pink);
    border:none;
    padding:12px;
    border-radius:25px;
    width:100%;
    color:white;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

/* SOCIAL */
.social-links{
    margin-top:auto;
    display:flex;
    gap:20px;
}
.social-links a{
    color:white;
    font-size:22px;
}

</style>
</head>

<body>

<div class="phone">

<!-- PAGE 1 -->
<div class="page active" id="p1">
    <div class="circle"></div>
    <h2>Eng. Taghreed</h2>

    <div class="ticker">
        <div class="ticker-track">
            🏆 Ranked #1 | GPA 4.0 | Top Graduate 💎 | 🏆 Ranked #1 | GPA 4.0
        </div>
    </div>

    <div class="desc"><span id="text"></span></div>

    <div class="social-links">
        <a href="#"><i class="fab fa-linkedin"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>
        <a href="#"><i class="fas fa-envelope"></i></a>
    </div>

    <button class="btn" onclick="showPage(1)">Next →</button>
</div>

<!-- PAGE 2 -->
<div class="page purple" id="p2">
    <h2>Skills</h2>
    <div class="card">KPI Analysis 📊</div>
    <div class="card">Business Insights 💡</div>
    <div class="card">Dashboarding 📈</div>

    <button class="btn" onclick="showPage(2)">Next →</button>
    <button class="btn" onclick="showPage(0)">← Back</button>
</div>

<!-- PAGE 3 -->
<div class="page green" id="p3">
    <h2>Projects</h2>
    <div class="card">Data Strategy</div>
    <div class="card">KPI Optimization</div>

    <button class="btn" onclick="showPage(1)">← Back</button>
</div>

</div>

<script>
// NAVIGATION
function showPage(index){
    let pages=document.querySelectorAll(".page");
    pages.forEach(p=>p.classList.remove("active"));
    pages[index].classList.add("active");

    let cards=pages[index].querySelectorAll(".card");
    cards.forEach((c,i)=>{
        c.classList.remove("show");
        setTimeout(()=>c.classList.add("show"),i*200);
    });
}

// TYPING
const words=["Turning Data into Decisions 📊","KPI Analysis & Insights 💡"];
let i=0,j=0,del=false;

function type(){
    let el=document.getElementById("text");
    let w=words[i];

    el.textContent=del?w.substring(0,j--):w.substring(0,j++);

    if(!del && j>w.length){del=true;setTimeout(type,1500);return;}
    if(del && j<0){del=false;i=(i+1)%words.length;j=0;}

    setTimeout(type,del?50:100);
}
type();
</script>

</body>
</html>
